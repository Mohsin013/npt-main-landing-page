<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover" />
    <meta name="description" content="NorthPeak Technologies - Your Startup Studio for Non-Technical Founders. We build 4-Week MVPs, AI Automations, Cloud Infrastructure, and Web & Mobile Apps." />
    <meta name="keywords" content="MVP development, AI automation, cloud infrastructure, web development, mobile apps, startup studio" />
    <meta name="author" content="NorthPeak Technologies" />
    <meta name="robots" content="index, follow" />
    <title>NorthPeak Technologies</title>
    <link rel="icon" type="image/png" href="/company_logo.png" />
    <link rel="apple-touch-icon" href="/company_logo.png" />
    <meta name="theme-color" content="#000000" />

    <!-- Performance Meta Tags -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />

    <!-- Preconnect to external domains -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- DNS Prefetch for performance -->
    <link rel="dns-prefetch" href="//fonts.googleapis.com" />
    <link rel="dns-prefetch" href="//fonts.gstatic.com" />

    <!-- Critical CSS for Safari mobile - prevents blank screen -->
    <style>
      /* Ensure visibility even before JS loads on Safari mobile */
      body {
        opacity: 1 !important;
        visibility: visible !important;
      }

      #root {
        opacity: 1 !important;
        visibility: visible !important;
        min-height: 100vh;
      }

      /* Force hardware acceleration on Safari */
      #root > * {
        transform: translateZ(0);
        -webkit-transform: translateZ(0);
      }

      /* Mobile-specific fixes */
      @media (max-width: 768px) {
        .reveal {
          opacity: 1 !important;
          transform: translateY(0) !important;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
